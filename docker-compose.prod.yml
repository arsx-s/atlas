services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: production
    ports:
      - "8000:8000"
    volumes:
      - atlas-data:/data
    env_file:
      - .env.prod
    environment:
      - ATLAS_ENV=production
      - ATLAS_SQLITE_PATH=/data/atlas-local.db
      - ATLAS_DOCUMENTS_PATH=/data/documents
      - ATLAS_STORAGE_PATH=/data/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; import sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/health').status == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  atlas-data:
